name: Test and Build

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  formalities:
    name: Test Formalities
    runs-on: ubuntu-slim
    steps:
      - name: HyperStickler
        uses: georgesapkin/hyperstickler@v1
        with:
          check_branch: false
          check_signoff: true
          feedback_url: 'https://github.com/openwrt/actions-shared-workflows/issues'
          guideline_url: 'https://openwrt.org/submitting-patches#submission_guidelines'
          max_body_line_len: 100
          max_subject_len_hard: 80
          max_subject_len_soft: 60
          # This still needs a fine-grained token related to:
          # https://github.com/openwrt/packages/pull/28011
          # job_step: 2
          # post_comment: true
          # warn_on_no_modify: true

  build:
    name: Feeds Package Test Build
    needs: formalities
    uses: openwrt/actions-shared-workflows/.github/workflows/multi-arch-test-build.yml@main
    # This fork maintains travelmate, a procd service that calls ubus. The
    # shared "generic tests" install the package into a per-arch qemu rootfs
    # and run a runtime smoke test that has no ubusd to connect to, so it fails
    # ("Failed to connect to ubus") on every runtime_test arch regardless of the
    # change under review. Disable it: the build/compile test still runs (that
    # is the part with real signal), and the device-shell lint is the merge gate.
    with:
      enable_generic_tests: false
      force_generic_tests: false
